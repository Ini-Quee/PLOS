<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Background Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: transparent;
      font-family: system-ui, sans-serif;
      color: white;
    }

    /* Sky gradient */
    .sky {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #0E4D92 0%, #1565C0 30%, #42A5F5 70%, #E3F2FD 100%);
      z-index: 0;
    }

    /* Snowflakes */
    @keyframes snow-drift {
      0% {
        transform: translateY(-20px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      25% {
        transform: translateY(25vh) translateX(40px) rotate(90deg);
      }
      50% {
        transform: translateY(50vh) translateX(-30px) rotate(180deg);
      }
      75% {
        transform: translateY(75vh) translateX(20px) rotate(270deg);
      }
      90% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(105vh) translateX(0) rotate(360deg);
        opacity: 0;
      }
    }

    .snowflake {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.7) 60%, rgba(255,255,255,0.3) 100%);
      box-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.5), inset 0 0 5px rgba(255,255,255,0.6);
      animation: snow-drift ease-in-out infinite;
      z-index: 2;
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 50px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin: 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .info {
      margin-top: 20px;
      font-size: 18px;
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="sky"></div>

  <!-- Generate 60 snowflakes -->
  <script>
    for (let i = 0; i < 60; i++) {
      const snow = document.createElement('div');
      snow.className = 'snowflake';
      const size = 8 + Math.random() * 12;
      snow.style.width = size + 'px';
      snow.style.height = size + 'px';
      snow.style.left = Math.random() * 100 + '%';
      snow.style.top = '-20px';
      snow.style.animationDuration = (8 + Math.random() * 10) + 's';
      snow.style.animationDelay = Math.random() * 12 + 's';
      document.body.appendChild(snow);
    }
  </script>

  <div class="content">
    <h1>❄️ Living Background Test</h1>
    <div class="info">
      <p><strong>If you can see snow falling, the animations work!</strong></p>
      <p>60 large snowflakes should be drifting down with rotation.</p>
      <p>If nothing moves, check browser console for errors.</p>
    </div>
  </div>
</body>
</html>
